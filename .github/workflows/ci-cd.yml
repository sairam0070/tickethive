name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Set up Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # 3️⃣ Build backend
    - name: Install backend dependencies
      working-directory: ./backend
      run: npm install

    - name: Build backend
      working-directory: ./backend
      run: npm run build

    # 4️⃣ Build frontend
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    # 5️⃣ Log in to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.sairamsr }}
        password: ${{ secrets.SaiRam@070707 }}

    # 6️⃣ Build Docker images
    - name: Build backend image
      run: docker build -t ${{ secrets.sairamsr }}/tickethive-backend:latest ./backend

    - name: Build frontend image
      run: docker build -t ${{ secrets.sairamsr }}/tickethive-frontend:latest ./frontend

    # 7️⃣ Push Docker images
    - name: Push backend image
      run: docker push ${{ secrets.sairamsr }}/tickethive-backend:latest

    - name: Push frontend image
      run: docker push ${{ secrets.sairamsr }}/tickethive-frontend:latest
